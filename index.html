<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://lf3-static.bytednsdoc.com/obj/eden-cn/ptlz_zlp/ljhwZthlaukjlkulzlp/js-sdk/bitable_ext_sdk_v2.js"></script>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #fff; }
    #btn { width: 100%; padding: 12px; background: #ccc; color: #fff; border: none; border-radius: 4px; cursor: not-allowed; font-weight: bold; transition: 0.3s; }
    #btn.ready { background: #3370ff; cursor: pointer; }
    #log { margin-top: 15px; font-size: 12px; color: #666; height: 350px; overflow-y: auto; border: 1px solid #eee; padding: 8px; background: #fafafa; }
    .success { color: #52c41a; } .error { color: #f5222d; }
  </style>
</head>
<body>
  <h4>达人库极速汇总 (V3.0 稳定版)</h4>
  <button id="btn" disabled>正在初始化飞书环境...</button>
  <div id="log">等待环境中...请确保在飞书侧边栏打开。</div>

  <script>
    const btn = document.getElementById('btn');
    const logEl = document.getElementById('log');
    function log(m, type = '') { 
      logEl.innerHTML += `<div class="${type}">${new Date().toLocaleTimeString()}: ${m}</div>`; 
      logEl.scrollTop = logEl.scrollHeight; 
    }

    // --- 自动检测飞书环境是否加载成功 ---
    const checkTimer = setInterval(() => {
      if (window.bitable) {
        clearInterval(checkTimer);
        btn.disabled = false;
        btn.className = 'ready';
        btn.innerText = '一键同步所有达人数据';
        log("✅ 环境加载成功，可以开始同步。", "success");
      }
    }, 500);

    btn.onclick = async () => {
      btn.disabled = true;
      btn.innerText = '正在同步中...';
      log("🚀 启动数据汇总程序...");
      
      try {
        const bitable = window.bitable;
        const base = await bitable.base; // 这里不会再报 undefined 错误了
        
        // 1. 指定三张表格的名字
        const targetTable = await base.getTableByName("达人初筛");
        const dyTable = await base.getTableByName("抖音达人库");
        const xhsTable = await base.getTableByName("小红书达人库");

        // 2. 建立查重索引（主键：达人ID）
        log("🔍 正在扫描主表已有的达人...");
        const targetRecords = await targetTable.getRecords({ max_count: 10000 });
        const masterMap = new Map();
        targetRecords.records.forEach(r => { 
          const id = r.fields["达人ID"];
          if(id) masterMap.set(String(id), r.id); 
        });

        // 3. 配置你的 10 个字段映射关系
        const configs = [
          {
            platform: "抖音", table: dyTable,
            map: { 
              "平台": "平台", "达人ID": "达人UID", "达人昵称": "达人昵称", "链接": "达人链接", 
              "主页图文": "视频图片", "视频": "视频图片", "下载人": "备注", "达人简介": "达人简介", "平台账号": "抖音号" 
            }
          },
          {
            platform: "小红书", table: xhsTable,
            map: { 
              "平台": "平台", "达人ID": "博主ID", "达人昵称": "博主昵称", "链接": "博主链接", 
              "主页图文": "笔记封面", "视频": "笔记视频", "下载人": "备注", "达人简介": "博主简介", "平台账号": "小红书号" 
            }
          }
        ];

        for (const config of configs) {
          log(`正在读取 [${config.platform}库]...`);
          const srcRecords = await config.table.getRecords({ max_count: 5000 });
          
          const toAdd = [], toUpdate = [];
          srcRecords.records.forEach(r => {
            const rawId = r.fields[config.map["达人ID"]];
            if(!rawId) return;
            const idVal = String(rawId);

            const fields = {};
            // 字段对齐逻辑
            for(let targetKey in config.map) {
              fields[targetKey] = r.fields[config.map[targetKey]];
            }
            fields["平台"] = config.platform;

            if(masterMap.has(idVal)) {
              toUpdate.push({ recordId: masterMap.get(idVal), fields });
            } else {
              toAdd.push({ fields });
            }
          });

          // 分批写入，每批 500 条
          for (let i = 0; i < toAdd.length; i += 500) { await targetTable.addRecords(toAdd.slice(i, i + 500)); }
          for (let i = 0; i < toUpdate.length; i += 500) { await targetTable.setRecords(toUpdate.slice(i, i + 500)); }
          log(`✅ [${config.platform}] 新增 ${toAdd.length} 条，更新 ${toUpdate.length} 条`, "success");
        }
        log("🎉 全部任务同步完成！");
      } catch (e) {
        log("❌ 出错了：" + e.message, "error");
        console.error(e);
      }
      btn.disabled = false;
      btn.innerText = '一键同步所有达人数据';
    };
  </script>
</body>
</html>
